<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RE/MAX FARO — Campo Track</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',sans-serif;background:#0f1f3d;min-height:100vh;display:flex;align-items:center;justify-content:center}
  .login-box{background:#fff;border-radius:16px;padding:40px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.4)}
  .logo{text-align:center;margin-bottom:28px}
  .logo-badge{background:#E8A020;color:#fff;font-size:13px;font-weight:600;padding:4px 12px;border-radius:5px;display:inline-block;margin-bottom:8px}
  .logo h1{font-size:20px;color:#1B3D6E;font-weight:600}
  .logo p{font-size:12px;color:#888;margin-top:4px}
  .form-group{margin-bottom:16px}
  .form-group label{display:block;font-size:12px;font-weight:500;color:#555;margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px}
  .form-group input{width:100%;padding:11px 14px;border:1px solid #ddd;border-radius:8px;font-size:14px;outline:none;transition:border .2s}
  .form-group input:focus{border-color:#1B3D6E}
  .btn-login{width:100%;padding:12px;background:#1B3D6E;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:500;cursor:pointer;margin-top:6px;transition:opacity .2s}
  .btn-login:hover{opacity:.9}
  .error{background:#FCEBEB;color:#A32D2D;padding:10px 14px;border-radius:6px;font-size:13px;margin-bottom:14px;display:none}
  .version{text-align:center;font-size:11px;color:#bbb;margin-top:20px}
</style>
</head>
<body>
<div class="login-box">
  <div class="logo">
    <div class="logo-badge">RE/MAX FARO</div>
    <h1>Campo Track</h1>
    <p>Plataforma de Inteligencia Inmobiliaria Rural · Santa Fe</p>
  </div>
  <div class="error" id="error-msg"></div>
  <div class="form-group"><label>Email</label><input type="email" id="email" placeholder="tu@email.com" autocomplete="email"></div>
  <div class="form-group"><label>Contraseña</label><input type="password" id="password" placeholder="••••••••" autocomplete="current-password"></div>
  <button class="btn-login" onclick="doLogin()">Ingresar</button>
  <div class="version">v1.0 · RE/MAX FARO · Santa Fe, Argentina</div>
</div>
<script>
async function doLogin(){
  const email=document.getElementById('email').value;
  const password=document.getElementById('password').value;
  const r=await fetch('/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
  const d=await r.json();
  if(d.ok){window.location.href='/';}
  else{const el=document.getElementById('error-msg');el.textContent=d.msg;el.style.display='block';}
}
document.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
</script>
</body>
</html>
